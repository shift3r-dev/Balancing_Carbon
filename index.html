<!doctype html>
<html lang="en">
  <head>
    <script>
      // Safe guard against libraries attempting to overwrite global fetch which is read-only in some environments
      (function() {
        let currentFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not define fetch setter on window:', e);
        }
        let currentGlobalFetch = globalThis.fetch;
        try {
          Object.defineProperty(globalThis, 'fetch', {
            get() {
              return currentGlobalFetch;
            },
            set(val) {
              currentGlobalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Could not define fetch setter on globalThis:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
