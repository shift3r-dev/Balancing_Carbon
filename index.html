<!doctype html>
<html lang="en">
  <head>
    <script>
      // Safe guard against libraries attempting to overwrite global fetch
      (function () {
        let currentFetch = window.fetch;

        try {
          Object.defineProperty(window, "fetch", {
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          console.warn("Could not define fetch setter on window:", e);
        }

        let currentGlobalFetch = globalThis.fetch;

        try {
          Object.defineProperty(globalThis, "fetch", {
            get() {
              return currentGlobalFetch;
            },
            set(val) {
              currentGlobalFetch = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          console.warn("Could not define fetch setter on globalThis:", e);
        }
      })();
    </script>
